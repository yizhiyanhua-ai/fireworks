<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 250" width="940" height="250" role="img" aria-label="fireworks-design six-phase pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f0f1a"/><stop offset="1" stop-color="#1a1a2e"/></linearGradient>
    <linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
    <linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#ea580c"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <linearGradient id="g3" x1="0" x2="1"><stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="g4" x1="0" x2="1"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#10b981"/></linearGradient>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#475569"/></marker>
  </defs>
  <rect width="940" height="250" fill="url(#bg)"/>
  <text x="470" y="28" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#94a3b8" letter-spacing="2">SIX-PHASE PIPELINE</text>
  <g font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle">
    <rect x="10" y="95" width="120" height="70" rx="12" fill="#0f172a" stroke="url(#g1)" stroke-width="1.6"/>
    <text x="70" y="123" fill="#a855f7" font-weight="700">① BRIEF</text>
    <text x="70" y="143" fill="#94a3b8" font-size="10.5">提炼设计系统</text>

    <rect x="160" y="70" width="130" height="120" rx="12" fill="#0f172a" stroke="url(#g2)" stroke-width="1.6"/>
    <text x="225" y="95" fill="#f97316" font-weight="700">② DIVERGE</text>
    <text x="225" y="115" fill="#94a3b8" font-size="10.5">N 路并行探索</text>
    <text x="225" y="143" fill="#475569" font-size="20">⊛⊛⊛⊛⊛⊛</text>
    <text x="225" y="165" fill="#475569" font-size="10">6–8 种风格</text>

    <rect x="320" y="55" width="130" height="150" rx="12" fill="#0f172a" stroke="url(#g3)" stroke-width="1.6"/>
    <text x="385" y="81" fill="#3b82f6" font-weight="700">③ JUDGE</text>
    <text x="385" y="101" fill="#94a3b8" font-size="10.5">评审面板</text>
    <text x="385" y="131" fill="#475569" font-size="16">▦ ▦ ▦</text>
    <text x="385" y="153" fill="#475569" font-size="16">▦ ▦ ▦</text>
    <text x="385" y="180" fill="#475569" font-size="10">6维 × N方向</text>

    <rect x="480" y="95" width="130" height="70" rx="12" fill="#0f172a" stroke="url(#g4)" stroke-width="1.6"/>
    <text x="545" y="123" fill="#10b981" font-weight="700">④ SYNTH</text>
    <text x="545" y="143" fill="#94a3b8" font-size="10.5">融合 Top3</text>

    <rect x="640" y="70" width="120" height="120" rx="12" fill="#0f172a" stroke="#eab308" stroke-width="1.6"/>
    <text x="700" y="95" fill="#eab308" font-weight="700">⑤ REFINE</text>
    <text x="700" y="115" fill="#94a3b8" font-size="10.5">评审↔修复</text>
    <path d="M690,143 C690,165 710,165 710,143" fill="none" stroke="#eab308" stroke-width="1.4" marker-end="url(#ah)"/>
    <text x="700" y="180" fill="#475569" font-size="10">循环 ×2</text>

    <rect x="790" y="95" width="130" height="70" rx="12" fill="#0f172a" stroke="#a855f7" stroke-width="1.6"/>
    <text x="855" y="123" fill="#a855f7" font-weight="700">⑥ POLISH</text>
    <text x="855" y="143" fill="#94a3b8" font-size="10.5">QA + 出图</text>
  </g>
  <g stroke="#475569" stroke-width="1.6" fill="none">
    <line x1="130" y1="130" x2="156" y2="130" marker-end="url(#ah)"/>
    <line x1="290" y1="130" x2="316" y2="130" marker-end="url(#ah)"/>
    <line x1="450" y1="130" x2="476" y2="130" marker-end="url(#ah)"/>
    <line x1="610" y1="130" x2="636" y2="130" marker-end="url(#ah)"/>
    <line x1="760" y1="130" x2="786" y2="130" marker-end="url(#ah)"/>
  </g>
</svg>
